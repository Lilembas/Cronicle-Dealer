version: '3.8'

services:
  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: cronicle-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cronicle_network

  # Manager 节点
  manager:
    build:
      context: ../..
      dockerfile: deployments/docker/manager.Dockerfile
    container_name: cronicle-manager
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_MODE=manager
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./config.yaml:/app/config.yaml
      - manager_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cronicle_network
    restart: unless-stopped

  # Worker 节点（可扩展）
  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/worker.Dockerfile
    environment:
      - SERVER_MODE=worker
      - MASTER_ADDRESS=manager:9090
      - WORKER_TAGS=["default","docker"]
    volumes:
      - worker_logs:/app/logs
    depends_on:
      - manager
    networks:
      - cronicle_network
    restart: unless-stopped
    deploy:
      replicas: 2

volumes:
  redis_data:
  manager_logs:
  worker_logs:

networks:
  cronicle_network:
    driver: bridge
