version: '3.8'

services:
  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: cronicle-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cronicle_network

  # Master 节点
  master:
    build:
      context: ../..
      dockerfile: deployments/docker/master.Dockerfile
    container_name: cronicle-master
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_MODE=master
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./config.yaml:/app/config.yaml
      - master_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cronicle_network
    restart: unless-stopped

  # Worker 节点（可扩展）
  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/worker.Dockerfile
    environment:
      - SERVER_MODE=worker
      - MASTER_ADDRESS=master:9090
      - WORKER_TAGS=["default","docker"]
    volumes:
      - worker_logs:/app/logs
    depends_on:
      - master
    networks:
      - cronicle_network
    restart: unless-stopped
    deploy:
      replicas: 2

volumes:
  redis_data:
  master_logs:
  worker_logs:

networks:
  cronicle_network:
    driver: bridge
