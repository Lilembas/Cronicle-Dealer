version: '3.8'

services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: cronicle-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cronicle_network

  # Manager
  manager:
    build:
      context: ..
      dockerfile: docker/manager.Dockerfile
    container_name: cronicle-manager
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"
    environment:
      - DATABASE_DRIVER=sqlite
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECURITY_JWT_SECRET=change-me-in-production
      - SECURITY_AUTH_TOKEN=change-me-in-production
      - LOGGING_LEVEL=info
    volumes:
      - manager_data:/app/data
      - manager_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cronicle_network
    restart: unless-stopped

  # Worker
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      - WORKER_MANAGER_ADDRESS=manager:9090
      - WORKER_AUTH_TOKEN=change-me-in-production
      - WORKER_NODE_TAGS=["default"]
    volumes:
      - worker_logs:/app/logs
    depends_on:
      - manager
    networks:
      - cronicle_network
    restart: unless-stopped
    deploy:
      replicas: 2

volumes:
  redis_data:
  manager_data:
  manager_logs:
  worker_logs:

networks:
  cronicle_network:
    driver: bridge
