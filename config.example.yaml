# Manager 配置
manager:
  host: "0.0.0.0"
  http_port: 8080
  grpc_port: 9090  # 如果Manager和Worker共用一个节点，他们应当配置不同的grpc端口

  # 调度配置
  scheduler:
    enabled: true
    tick_interval: 60  # 秒

  # 心跳检测
  heartbeat:
    timeout: 30  # 秒，超过此时间未收到心跳视为离线
    check_interval: 5  # 秒

    max_delay_sec: 30       # 退避上限（秒）
  
  # 数据保留策略
  history:
    event_retention_days: 30   # 任务执行记录保留天数
    metric_retention_days: 7   # 节点负载历史保留天数

# Worker 配置
worker:
  # Manager 地址
  manager_address: "localhost:9090"
  
  # 节点信息
  node:
    hostname: ""  # 为空则自动获取
    tags: ["default"]
  
  # 心跳配置
  heartbeat:
    interval: 5  # 秒
  
  # 任务执行配置
  executor:
    grpc_port: 50051
    default_timeout: 3600  # 秒

  # 认证 Token（必须与 Manager 端 security.auth_token 一致）
  auth_token: "change-me-in-production"

# 数据库配置
database:
  # 驱动类型: "sqlite" 或 "postgres"
  driver: "sqlite"
  # SQLite 配置
  path: "./cronicle.db"
  # PostgreSQL 配置（当 driver 为 "postgres" 时使用）
  # host: "localhost"
  # port: 5432
  # database: "cronicle"
  # username: "cronicle"
  # password: "cronicle_password"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300  # 秒

# Redis 配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

# 安全配置
security:
  # JWT 配置
  jwt:
    secret: "change-me-in-production"
    expire_hours: 24
  
  # Worker 通信认证 Token
  auth_token: "change-me-in-production"

# 日志配置
logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json 或 console
  output: "stdout"  # stdout 或文件路径
  
# 存储配置
storage:
  # 日志存储路径
  log_dir: "./logs"
  
  # 日志保留时间
  log_retention_days: 30
  
  # 日志文件最大大小
  max_log_size_mb: 100
