<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronicle Shell命令测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '▶';
            color: #667eea;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #commandInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        #commandInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status {
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
        }

        .status.warning {
            background: #fff3e0;
            color: #f57c00;
            border-left: 4px solid #f57c00;
        }

        #outputContainer {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            position: relative;
        }

        #output {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #output .command {
            color: #4ec9b0;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #output .timestamp {
            color: #858585;
        }

        #output .output {
            color: #d4d4d4;
            margin: 10px 0;
        }

        #output .error {
            color: #f48771;
        }

        #output .success {
            color: #4ec9b0;
        }

        #output .separator {
            color: #569cd6;
            margin: 15px 0;
            border-bottom: 1px dashed #569cd6;
            padding-bottom: 15px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .example-btn {
            padding: 8px 15px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .clear-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 流式输出样式 */
        .output-block {
            background: #1e1e1e;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .output-block.streaming {
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #2d2d2d;
            border-bottom: 1px solid #3d3d3d;
        }

        .output-command {
            color: #4ec9b0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
        }

        .output-meta {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #3d3d3d;
            color: #d4d4d4;
        }

        .output-meta.executing {
            background: #667eea;
            color: white;
        }

        .output-meta.success {
            background: #4ec9b0;
            color: #1e1e1e;
        }

        .output-meta.failed {
            background: #f48771;
            color: #1e1e1e;
        }

        .output-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .output-content.streaming {
            background: #1a1a1a;
        }

        .output-text {
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Cronicle Shell命令测试工具</h1>
            <p>实时向Worker发送Shell命令并查看执行结果</p>
        </div>

        <div class="content">
            <!-- 节点选择和命令输入区域 -->
            <div class="section">
                <div class="section-title">执行配置</div>

                <!-- 节点选择 -->
                <div style="margin-bottom: 15px;">
                    <label style="color: #333; font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block;">
                        选择Worker节点：
                    </label>
                    <select id="nodeSelect" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 300px;">
                        <option value="">自动选择节点</option>
                        <option value="" disabled>正在加载节点...</option>
                    </select>
                    <span id="nodeCount" style="margin-left: 10px; color: #666; font-size: 13px;"></span>
                </div>

                <div class="section-title" style="margin-top: 20px;">Shell命令输入</div>

                <div class="input-group">
                    <input
                        type="text"
                        id="commandInput"
                        placeholder="输入要执行的Shell命令，例如: ls -la, pwd, whoami..."
                        autofocus
                    >
                    <button class="btn btn-primary" id="executeBtn" onclick="executeCommand()">
                        <span>▶</span> 执行命令
                    </button>
                    <button class="btn btn-secondary" onclick="clearOutput()">
                        清空输出
                    </button>
                </div>

                <div class="examples">
                    <span style="color: #666; font-size: 14px; padding: 8px 0;">快速示例：</span>
                    <button class="example-btn" onclick="setCommand('pwd')">pwd</button>
                    <button class="example-btn" onclick="setCommand('ls -la')">ls -la</button>
                    <button class="example-btn" onclick="setCommand('whoami')">whoami</button>
                    <button class="example-btn" onclick="setCommand('date')">date</button>
                    <button class="example-btn" onclick="setCommand('uname -a')">uname -a</button>
                    <button class="example-btn" onclick="setCommand('df -h')">df -h</button>
                    <button class="example-btn" onclick="setCommand('free -h')">free -h</button>
                    <button class="example-btn" onclick="setCommand('uptime')">uptime</button>
                    <button class="example-btn" onclick="setCommand('echo $HOME')">echo $HOME</button>
                    <button class="example-btn" onclick="setCommand('ps aux | head -20')">ps aux | head -20</button>
                </div>
            </div>

            <!-- 状态提示 -->
            <div id="statusInfo" class="status info"></div>

            <!-- 输出区域 -->
            <div class="section">
                <div class="section-title">
                    执行结果
                    <button class="clear-btn" onclick="clearOutput()">清空</button>
                </div>
                <div id="outputContainer">
                    <div id="output">
                        <div style="color: #858585; text-align: center; padding: 50px;">
                            等待命令执行...<br>
                            <small style="color: #666;">在上方输入命令并点击"执行命令"</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats">
                <div class="stat-card">
                    <div class="label">总执行次数</div>
                    <div class="value" id="totalExecutions">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">成功次数</div>
                    <div class="value" id="successCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">失败次数</div>
                    <div class="value" id="failedCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">平均执行时间</div>
                    <div class="value" id="avgTime">0ms</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stats = {
            total: 0,
            success: 0,
            failed: 0,
            totalTime: 0
        };

        // API配置
        const API_BASE = '/api/v1';

        // 设置命令
        function setCommand(cmd) {
            document.getElementById('commandInput').value = cmd;
            document.getElementById('commandInput').focus();
        }

        // 显示状态
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusInfo');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type + ' show';

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusDiv.className = 'status';
                }, 5000);
            }
        }

        // 更新统计
        function updateStats(duration, success) {
            stats.total++;
            stats.totalTime += duration;

            if (success) {
                stats.success++;
            } else {
                stats.failed++;
            }

            document.getElementById('totalExecutions').textContent = stats.total;
            document.getElementById('successCount').textContent = stats.success;
            document.getElementById('failedCount').textContent = stats.failed;
            document.getElementById('avgTime').textContent =
                Math.round(stats.totalTime / stats.total) + 'ms';
        }

        // 添加输出
        function addOutput(command, output, exitCode, duration, error) {
            const outputDiv = document.getElementById('output');

            // 如果是第一次输出，清除占位文本
            if (outputDiv.querySelector('div[style*="color: #858585"]')) {
                outputDiv.innerHTML = '';
            }

            const timestamp = new Date().toLocaleString('zh-CN');
            const statusClass = exitCode === 0 ? 'success' : 'error';
            const statusText = exitCode === 0 ? '✓ 成功' : '✗ 失败';

            let html = '<div class="separator"></div>' +
                       '<div class="command">$ ' + command + '</div>' +
                       '<div class="timestamp">⏰ ' + timestamp + ' | ⏱ ' + duration + 'ms | <span class="' + statusClass + '">' + statusText + '</span></div>';

            if (error) {
                html += '<div class="error">❌ 错误: ' + error + '</div>';
            }

            if (output) {
                html += '<div class="output">' + escapeHtml(output) + '</div>';
            }

            outputDiv.innerHTML += html;

            // 滚动到底部
            const container = document.getElementById('outputContainer');
            container.scrollTop = container.scrollHeight;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空输出
        function clearOutput() {
            document.getElementById('output').innerHTML =
                '<div style="color: #858585; text-align: center; padding: 50px;">等待命令执行...<br>' +
                '<small style="color: #666;">在上方输入命令并点击"执行命令"</small></div>';
            showStatus('输出已清空', 'info');
        }

        // 执行命令（支持流式输出）
        async function executeCommand() {
            const commandInput = document.getElementById('commandInput');
            const command = commandInput.value.trim();
            const executeBtn = document.getElementById('executeBtn');

            if (!command) {
                showStatus('请输入要执行的命令', 'warning');
                return;
            }

            // 禁用按钮，显示加载状态
            executeBtn.disabled = true;
            executeBtn.innerHTML = '<div class="loading"></div> 执行中...';
            showStatus('正在执行命令...', 'info');

            const startTime = Date.now();
            let eventID = null;
            let outputDiv = null;
            let lastLogLength = 0;

            try {
                // 获取选中的节点ID
                const selectedNodeId = document.getElementById('nodeSelect').value;

                const response = await fetch(API_BASE + '/shell/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        command: command,
                        node_id: selectedNodeId || ""
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '执行失败');
                }

                eventID = data.event_id;

                // 创建新的输出块
                outputDiv = document.createElement('div');
                outputDiv.className = 'output-block';
                outputDiv.innerHTML = `
                    <div class="output-header">
                        <div class="output-command">$ ${escapeHtml(command)}</div>
                        <div class="output-meta executing">执行中...</div>
                    </div>
                    <div class="output-content streaming">
                        <pre class="output-text"></pre>
                    </div>
                `;
                outputContainer.appendChild(outputDiv);

                const outputText = outputDiv.querySelector('.output-text');
                const outputMeta = outputDiv.querySelector('.output-meta');

                // 开始轮询获取实时输出
                const pollInterval = setInterval(async () => {
                    try {
                        const logsResponse = await fetch(`${API_BASE}/logs/${eventID}`);
                        const logsData = await logsResponse.json();

                        if (logsResponse.ok) {
                            // 更新输出
                            const currentLogs = logsData.logs || '';
                            if (currentLogs.length > lastLogLength) {
                                const newLogs = currentLogs.substring(lastLogLength);
                                outputText.textContent += newLogs;
                                lastLogLength = currentLogs.length;
                                // 自动滚动到底部
                                outputText.scrollTop = outputText.scrollHeight;
                            }

                            // 检查是否完成
                            if (logsData.complete) {
                                clearInterval(pollInterval);
                                const duration = Date.now() - startTime;
                                const exitCode = logsData.exit_code || 0;
                                const success = (exitCode === 0);

                                // 更新输出块样式
                                outputDiv.classList.remove('streaming');
                                outputMeta.textContent = `完成 (${duration}ms, 退出码: ${exitCode})`;
                                outputMeta.className = success ? 'output-meta success' : 'output-meta failed';

                                showStatus(`命令执行完成 (退出码: ${exitCode}, 耗时: ${duration}ms)`,
                                        success ? 'success' : 'warning');
                                updateStats(duration, success);

                                // 恢复按钮状态
                                executeBtn.disabled = false;
                                executeBtn.innerHTML = '<span>▶</span> 执行命令';
                                commandInput.focus();
                            }
                        }
                    } catch (error) {
                        console.error('轮询日志失败:', error);
                        // 不中断轮询，继续尝试
                    }
                }, 200); // 每200ms轮询一次

            } catch (error) {
                const duration = Date.now() - startTime;
                addOutput(command, null, null, duration, '网络错误: ' + error.message);
                updateStats(duration, false);
                showStatus('网络错误: ' + error.message, 'error');
                executeBtn.disabled = false;
                executeBtn.innerHTML = '<span>▶</span> 执行命令';
                commandInput.focus();
            }
        }

        // 回车键执行
        document.getElementById('commandInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                executeCommand();
            }
        });

        // 页面加载时显示欢迎信息
        showStatus('准备就绪！输入命令开始测试', 'info');

        // 加载节点列表
        async function loadNodes() {
            try {
                const response = await fetch('/api/v1/nodes');
                const data = await response.json();

                const nodeSelect = document.getElementById('nodeSelect');
                const nodeCount = document.getElementById('nodeCount');

                // 清空现有选项
                nodeSelect.innerHTML = '<option value="">自动选择节点</option>';

                if (data.nodes && data.nodes.length > 0) {
                    // 添加节点选项
                    data.nodes.forEach(node => {
                        const option = document.createElement('option');
                        option.value = node.id;
                        option.textContent = `${node.hostname} (${node.ip})`;
                        nodeSelect.appendChild(option);
                    });

                    nodeCount.textContent = `共 ${data.count} 个节点在线`;
                    nodeCount.style.color = '#28a745';
                } else {
                    nodeCount.textContent = '暂无在线节点';
                    nodeCount.style.color = '#dc3545';
                }
            } catch (error) {
                console.error('加载节点列表失败:', error);
                const nodeCount = document.getElementById('nodeCount');
                if (nodeCount) {
                    nodeCount.textContent = '加载节点列表失败';
                    nodeCount.style.color = '#dc3545';
                }
            }
        }

        // 自动检查Worker状态
        async function checkWorkerStatus() {
            try {
                const response = await fetch('/api/v1/health');
                const data = await response.json();

                if (data.online_nodes > 0) {
                    showStatus(`✅ 系统就绪！${data.online_nodes} 个 Worker 节点在线`, 'success');
                    return true;
                } else {
                    showStatus('⚠️ 没有在线的 Worker 节点，请先启动 Worker', 'warning');
                    return false;
                }
            } catch (error) {
                showStatus('❌ 无法连接到 Master 服务器', 'error');
                return false;
            }
        }

        // 页面加载后立即检查状态和加载节点
        checkWorkerStatus();
        loadNodes();

        // 每10秒自动检查一次状态和刷新节点列表
        setInterval(() => {
            checkWorkerStatus();
            loadNodes();
        }, 10000);
    </script>
</body>
</html>
